<!-- File: settings.html -->
<!-- Summary: Application user preferences and settings page -->
<!-- Responsibilities: Display and edit all app_settings values from core.db -->

<section class="card">
    <h2>Application Settings</h2>
    <div class="form-grid">
        <div class="form-group">
            <label for="agent-name">Agent name:</label>
            <input type="text" id="agent-name" placeholder="PolyBox">
        </div>
        <div class="form-group">
            <label for="user-name">User name:</label>
            <input type="text" id="user-name" placeholder="User">
        </div>
        <div class="form-group">
            <label for="user-timezone">Timezone:</label>
            <select id="user-timezone">
                <option value="">-- Detect Automatically --</option>
            </select>
        </div>
        <div class="form-group">
            <label for="max-iterations">Max iterations:</label>
            <input type="number" id="max-iterations" value="0" placeholder="0 = unlimited">
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" id="show-reasoning" checked>
            <label for="show-reasoning">Show reasoning</label>
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" id="reasoning-collapsed-default">
            <label for="reasoning-collapsed-default">Reasoning collapsed by default</label>
        </div>
        <div class="form-group">
            <label for="chat-history-turn-limit">Chat history turn limit:</label>
            <input type="number" id="chat-history-turn-limit" value="20">
        </div>
        <div class="form-group">
<label for="output-token-reserve">Output token reserve:</label>
<input type="number" id="output-token-reserve" value="512">
</div>
<div class="form-group">
<label for="health-check-timeout">Health check timeout (seconds):</label>
<input type="number" id="health-check-timeout" value="120" placeholder="120">
</div>
<div class="form-group">
<label for="thinking-open-tag">Thinking open tag:</label>
            <input type="text" id="thinking-open-tag" placeholder="<think>">
        </div>
        <div class="form-group">
            <label for="thinking-close-tag">Thinking close tag:</label>
            <input type="text" id="thinking-close-tag" placeholder="</think>">
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" id="store-context-debug">
            <label for="store-context-debug">Store context debug</label>
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" id="embeddings-enabled" checked>
            <label for="embeddings-enabled">Embeddings enabled</label>
        </div>
    </div>
</section>

<section class="card">
    <div class="button-row">
        <button id="save-settings-btn" class="btn-primary">Save All Settings</button>
    </div>
    <div id="settings-action-message" class="message hidden"></div>
</section>
