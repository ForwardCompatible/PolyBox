<!-- chat.html -->
<!-- Chat interface page -->
<!--
Responsibilities:
- Main chat interface container
- Message history display area
- Message input field
- Action tag controls

Created: 2026-04-20
-->

<div class="chat-container">
    <div id="message-history" class="message-history">
        <div class="message system-message">
            <div class="message-content">
                <p>Welcome to PolyBox. System is ready.</p>
            </div>
        </div>
    </div>

    <div class="chat-input-container">
        <div class="chat-input-wrapper">
            <textarea id="chat-input" placeholder="Enter your message..." rows="1"></textarea>
            <button id="send-button" class="send-button">
                <span>Send</span>
            </button>
        </div>
    </div>
</div>
